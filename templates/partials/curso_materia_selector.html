{# Selector CURSO / MATERIA — solo cursos añadidos por el estudiante #}
<div class="nb-curso-select" id="nb-curso-materia-wrap">
    <span class="nb-curso-select__label">Curso / materia</span>
    <div class="nb-curso-select__wrap">
        <span class="material-symbols-outlined nb-curso-select__icon" aria-hidden="true">school</span>
        <select id="nb-curso-materia-select" class="nb-curso-select__field nb-curso-select__field--empty"
            data-nebula-curso-select data-navigate="true"
            data-placeholder="Añade cursos desde el catálogo"
            aria-label="Seleccionar curso o materia">
            <option value="" disabled selected>Añade cursos desde el catálogo</option>
        </select>
        <span class="material-symbols-outlined nb-curso-select__chevron" aria-hidden="true">expand_more</span>
    </div>
</div>
