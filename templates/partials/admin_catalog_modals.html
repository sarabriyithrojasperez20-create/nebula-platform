<dialog id="admin-modal-curso" class="admin-catalog-modal rounded-2xl border-0 p-0 max-w-lg w-[calc(100%-2rem)] shadow-xl backdrop:bg-black/40">
<form id="admin-form-curso" class="p-6">
<h3 class="font-title-lg text-on-surface mb-4" id="admin-modal-curso-titulo">Nuevo curso</h3>
<input type="hidden" id="admin-curso-edit-slug" name="edit_slug" value="">
<label class="block mb-3"><span class="text-xs font-semibold text-outline uppercase">Nombre</span>
<input name="titulo" required class="mt-1 w-full rounded-xl border border-surface-container px-3 py-2 text-sm"></label>
<label class="block mb-3"><span class="text-xs font-semibold text-outline uppercase">Identificador (slug)</span>
<input name="slug" class="mt-1 w-full rounded-xl border border-surface-container px-3 py-2 text-sm" placeholder="auto si se deja vacío"></label>
<div class="grid grid-cols-2 gap-3 mb-3">
<label class="block"><span class="text-xs font-semibold text-outline uppercase">Nivel</span>
<select name="nivel" class="mt-1 w-full rounded-xl border border-surface-container px-3 py-2 text-sm">
<option>Principiante</option><option selected>Intermedio</option><option>Avanzado</option></select></label>
<label class="block"><span class="text-xs font-semibold text-outline uppercase">Materia</span>
<select name="categoria" class="mt-1 w-full rounded-xl border border-surface-container px-3 py-2 text-sm">
<option value="matematicas">Matemáticas</option><option value="ciencias">Ciencias</option>
<option value="lenguaje">Lenguaje</option><option value="historia">Historia</option></select></label>
</div>
<label class="block mb-3"><span class="text-xs font-semibold text-outline uppercase">Descripción</span>
<textarea name="descripcion" rows="3" class="mt-1 w-full rounded-xl border border-surface-container px-3 py-2 text-sm"></textarea></label>
<label class="block mb-3"><span class="text-xs font-semibold text-outline uppercase">Duración estimada</span>
<input name="duracion_total" class="mt-1 w-full rounded-xl border border-surface-container px-3 py-2 text-sm" placeholder="24 h estimadas"></label>
<label class="flex items-center gap-2 mb-4"><input type="checkbox" name="activo" value="1" checked class="rounded">
<span class="text-sm text-secondary">Curso activo (visible en catálogo)</span></label>
<div class="flex gap-3 justify-end">
<button type="button" class="admin-catalog-cancel px-4 py-2 rounded-xl text-sm font-semibold border border-surface-container">Cancelar</button>
<button type="submit" class="px-4 py-2 rounded-xl text-sm font-bold text-white bg-primary">Guardar cambios</button>
</div>
</form>
</dialog>

<dialog id="admin-modal-leccion" class="admin-catalog-modal rounded-2xl border-0 p-0 max-w-lg w-[calc(100%-2rem)] shadow-xl backdrop:bg-black/40">

<input name="titulo" required class="mt-1 w-full rounded-xl border border-surface-container px-3 py-2 text-sm"></label>
<label class="block mb-3"><span class="text-xs font-semibold text-outline uppercase">Duración</span>

</div>
</form>
